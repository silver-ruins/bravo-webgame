<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Snake | Concept Mode</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="bg-dark text-light">

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">

            <a class="navbar-brand" href="../index.html">
                <i class="bi bi-controller"></i>
                RGB Snake
            </a>

            <div class="ms-auto">
                <a href="../index.html" class="btn btn-outline-light btn-sm">
                    Home
                </a>

                <a href="full.html" class="btn btn-light btn-sm">
                    Full Game
                </a>
            </div>

        </div>
    </nav>

    <!-- ================= TITLE ================= -->

    <div class="container text-center mt-5">

        <h1>🐍 Concept Mode</h1>

        <p>
            Feed your pet snake Reggie!
        </p>

    </div>

    <!-- ================= PLAYER INFO ================= -->

    <div class="container mt-4">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card bg-secondary text-light">

                    <div class="card-body">

                        <h4>Player</h4>

                        <p id="playerName">
                            Guest
                        </p>

                        <h4>Score</h4>

                        <h2 id="score">
                            0
                        </h2>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= GAME BOARD ================= -->

    <div class="container text-center mt-5">

        <canvas
            id="gameCanvas"
            width="400"
            height="400"
            class="border border-success bg-black">
        </canvas>

    </div>

    <!-- ================= CONTROLS ================= -->

    <div class="container text-center mt-4">

        <button
            id="startBtn"
            class="btn btn-success">

            Start

        </button>

        <button
            id="resetBtn"
            class="btn btn-danger">

            Reset

        </button>

    </div>

    <!-- ================= CONTROLS INFO ================= -->

    <div class="container text-center mt-4">

        <h4>Controls</h4>

        <p>
            ↑ ↓ ← → Arrow Keys
        </p>

    </div>

    <!-- ================= GAME STATUS ================= -->

    <div class="container text-center mt-4">

        <h3 id="gameStatus">
            Press Start to Play
        </h3>

    </div>

    <!-- ================= FOOTER ================= -->

    <footer class="bg-success text-center py-3 mt-5">

        <p class="mb-0">
            RGB Snake Concept Version
        </p>

    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Concept JS -->
    <script src="../assets/js/concept.js"></script>

</body>

</html>
