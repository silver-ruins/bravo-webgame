<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Snake | Full Game</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="bg-dark text-light">

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">

            <a class="navbar-brand" href="../index.html">
                <i class="bi bi-controller"></i>
                RGB Snake
            </a>

            <div class="ms-auto">

                <a href="../index.html" class="btn btn-outline-light btn-sm">
                    Home
                </a>

                <a href="concept.html" class="btn btn-outline-light btn-sm">
                    Concept Mode
                </a>

            </div>

        </div>
    </nav>

    <!-- ================= TITLE ================= -->

    <div class="container text-center mt-5">

        <h1>🐍 RGB Snake</h1>

        <p class="lead">
            Full Version
        </p>

    </div>

    <!-- ================= PLAYER INFO ================= -->

    <div class="container">

        <div class="row g-3">

            <div class="col-md-3">

                <div class="card bg-secondary text-light">

                    <div class="card-body">

                        <h5>
                            <i class="bi bi-person-fill"></i>
                            Player
                        </h5>

                        <p id="playerName">
                            Guest
                        </p>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card bg-secondary text-light">

                    <div class="card-body">

                        <h5>
                            <i class="bi bi-star-fill"></i>
                            Score
                        </h5>

                        <h2 id="score">0</h2>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card bg-secondary text-light">

                    <div class="card-body">

                        <h5>
                            <i class="bi bi-calendar-event"></i>
                            Date
                        </h5>

                        <p id="dateTime"></p>

                    </div>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card bg-secondary text-light">

                    <div class="card-body">

                        <h5>
                            <i class="bi bi-browser-chrome"></i>
                            Browser
                        </h5>

                        <p id="browser"></p>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= GAME AREA ================= -->

    <div class="container mt-5">

        <div class="row">

            <!-- Game -->

            <div class="col-lg-8 text-center">

                <canvas
                    id="gameCanvas"
                    width="600"
                    height="600"
                    class="border border-success bg-black">
                </canvas>

                <div class="mt-4">

                    <button
                        id="startBtn"
                        class="btn btn-success">

                        <i class="bi bi-play-fill"></i>
                        Start

                    </button>

                    <button
                        id="resetBtn"
                        class="btn btn-danger">

                        <i class="bi bi-arrow-clockwise"></i>
                        Reset

                    </button>

                    <button
                        id="pauseBtn"
                        class="btn btn-warning">

                        <i class="bi bi-pause-fill"></i>
                        Pause

                    </button>

                </div>

                <h3 class="mt-4" id="gameStatus">
                    Press Start to Begin
                </h3>

            </div>

            <!-- Sidebar -->

            <div class="col-lg-4">

                <div class="card bg-secondary text-light mb-4">

                    <div class="card-header">

                        Leaderboard

                    </div>

                    <div class="card-body">

                        <ol id="leaderboard">

                            <li>No Scores Yet</li>

                        </ol>

                    </div>

                </div>

                <div class="card bg-secondary text-light">

                    <div class="card-header">

                        Controls

                    </div>

                    <div class="card-body">

                        <ul>

                            <li>Arrow Keys = Move</li>

                            <li>Eat food to grow.</li>

                            <li>Don't hit yourself.</li>

                            <li>Don't hit the wall.</li>

                        </ul>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- ================= FOOTER ================= -->

    <footer class="bg-success text-center mt-5 p-3">

        <p class="mb-1">

            RGB Snake

        </p>

        <a href="../index.html" class="text-light">
            Home
        </a>

        |

        <a href="concept.html" class="text-light">
            Concept Version
        </a>

    </footer>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Full Game JS -->
    <script src="../assets/js/full.js"></script>

</body>

</html>
